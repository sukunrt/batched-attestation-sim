# Smoke experiment to exercise the partial-messages gossip path:
# degree=20 > D=8, so each node has ~12 non-mesh peers eligible for IHAVE gossip.
topology:
  num_nodes: 32
  degree: 20
  type: random
  seed: 42
  super_node_fraction: 0.2

simulations:
  - gossipsub_params:
      D: 8
      Dlow: 6
      Dhigh: 12
    num_topics: 1
    num_slots: 3
    slot_duration_seconds: 5
    num_attestors: 16
    attestation_validation_delay_ms: 5
    attestation_validation_std_dev_ms: 0
    stop_time_minutes: 4.0
    log_level: info
    bandwidth_log_frequency_ms: 500
    use_partial_messages: true
    publish_interval_ms: 20
    attestation_data_size: 128
    signature_size: 96
    max_peers_per_attestation: 0
    divergent_attestor_fraction: 0.01
    validation_batch_window_ms: 10
    per_attestation_validation_us: 100
