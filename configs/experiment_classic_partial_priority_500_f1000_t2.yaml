# Experiment: classic vs partial vs partial-priority, heavier attestor load.
# Same network as experiment_classic_partial_priority_500_f500_t2.yaml, but
# 1000 fanout attestors per topic instead of 500:
#   - 500 mesh (relay) nodes
#   - 2 topics per node
#   - 1000 fanout nodes per topic (2000 total fanout = 2500 simulated hosts)
#   - 1000 attestors per topic per slot (all fanout)
# Everything else (degree, D, slots, validation, N) is unchanged so this
# isolates the effect of doubling the attester count on the same network.

topology:
  num_nodes: 500
  degree: 30
  type: random
  seed: 42
  super_node_fraction: 0.2
  fanout_nodes_per_topic: 1000
  fanout_node_mesh_peers: 2

simulations:
  # 1. Classic gossipsub
  - gossipsub_params:
      D: 8
      Dlow: 6
      Dhigh: 12
    num_topics: 2
    num_slots: 3
    slot_duration_seconds: 10
    num_attestors: 1000
    attestation_data_size: 128
    signature_size: 96
    attestation_validation_delay_ms: 10
    attestation_validation_std_dev_ms: 3
    validation_batch_window_ms: 10
    per_attestation_validation_us: 100
    stop_time_minutes: 10.0
    log_level: info
    bandwidth_log_frequency_ms: 200
    use_partial_messages: false
    disable_ihave_gossip: false

  # 2. Partial messages (one large push per peer per tick)
  - gossipsub_params:
      D: 8
      Dlow: 6
      Dhigh: 12
    num_topics: 2
    num_slots: 3
    slot_duration_seconds: 10
    num_attestors: 1000
    attestation_data_size: 128
    signature_size: 96
    attestation_validation_delay_ms: 10
    attestation_validation_std_dev_ms: 3
    validation_batch_window_ms: 10
    per_attestation_validation_us: 100
    stop_time_minutes: 10.0
    log_level: info
    bandwidth_log_frequency_ms: 200
    use_partial_messages: true
    publish_interval_ms: 20
    max_peers_per_attestation: 0
    divergent_attestor_fraction: 0.01
    disable_ihave_gossip: false

  # 3. Partial-priority (size-capped <= 30/msg, least-forwarded-first)
  - gossipsub_params:
      D: 8
      Dlow: 6
      Dhigh: 12
    num_topics: 2
    num_slots: 3
    slot_duration_seconds: 10
    num_attestors: 1000
    attestation_data_size: 128
    signature_size: 96
    attestation_validation_delay_ms: 10
    attestation_validation_std_dev_ms: 3
    validation_batch_window_ms: 10
    per_attestation_validation_us: 100
    stop_time_minutes: 10.0
    log_level: info
    bandwidth_log_frequency_ms: 200
    partial_priority: true
    publish_interval_ms: 20
    max_peers_per_attestation: 0
    max_attestations_per_message: 30
    divergent_attestor_fraction: 0.01
    disable_ihave_gossip: false
